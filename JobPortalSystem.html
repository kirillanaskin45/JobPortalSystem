<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 Job Portal Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 3px solid #ff6b6b;
        }

        /* Main content */
        .main-content {
            display: flex;
            padding: 20px;
            gap: 20px;
            min-height: 600px;
        }

        /* Left panel - Form */
        .form-panel {
            flex: 1;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-apply {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .btn-clear {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        /* Right panel - Table */
        .table-panel {
            flex: 2;
            background: white;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ff6b6b;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .table-panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff6b6b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 12px;
            font-weight: 600;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #e3f2fd;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-new { background: #3498db; color: white; }
        .status-review { background: #f1c40f; color: white; }
        .status-interview { background: #9b59b6; color: white; }
        .status-accepted { background: #2ecc71; color: white; }
        .status-rejected { background: #e74c3c; color: white; }

        .table-controls {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-edit {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
        }

        .btn-status {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        .btn-delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        /* Bottom panel */
        .bottom-panel {
            background: #f8f9fa;
            padding: 20px;
            border-top: 2px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box input {
            padding: 8px 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            width: 250px;
        }

        .btn-search {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        .btn-show-all {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .btn-stats {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .status-info {
            font-weight: bold;
            color: #2ecc71;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 2px solid #e9ecef;
            border-radius: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-save {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        tr {
            animation: slideIn 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .bottom-panel {
                flex-direction: column;
                gap: 10px;
            }
            
            .search-box {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            💼 JOB PORTAL MANAGEMENT SYSTEM 💼
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel - Form -->
            <div class="form-panel">
                <h2><i>📝</i> Подать заявку</h2>
                
                <div class="form-group">
                    <label>👤 ФИО:</label>
                    <input type="text" id="name" placeholder="Иванов Иван Иванович">
                </div>
                
                <div class="form-group">
                    <label>📧 Email:</label>
                    <input type="email" id="email" placeholder="ivan@mail.com">
                </div>
                
                <div class="form-group">
                    <label>📱 Телефон:</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 123-45-67">
                </div>
                
                <div class="form-group">
                    <label>💼 Должность:</label>
                    <input type="text" id="jobTitle" placeholder="Java Developer">
                </div>
                
                <div class="form-group">
                    <label>🎓 Квалификация:</label>
                    <input type="text" id="qualification" placeholder="B.Tech, MS, PhD...">
                </div>
                
                <div class="form-group">
                    <label>📊 Статус:</label>
                    <select id="status">
                        <option value="Новая">Новая</option>
                        <option value="Рассматривается">Рассматривается</option>
                        <option value="Интервью">Интервью</option>
                        <option value="Принята">Принята</option>
                        <option value="Отклонена">Отклонена</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-apply" onclick="applyJob()">
                        <i>📨</i> Отправить
                    </button>
                    <button class="btn btn-clear" onclick="clearForm()">
                        <i>🔄</i> Очистить
                    </button>
                </div>
            </div>

            <!-- Right Panel - Table -->
            <div class="table-panel">
                <h2><i>📋</i> Список заявок</h2>
                
                <div class="table-container">
                    <table id="applicationsTable">
                        <thead>
                            <tr>
                                <th>ФИО</th>
                                <th>Email</th>
                                <th>Телефон</th>
                                <th>Должность</th>
                                <th>Квалификация</th>
                                <th>Статус</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Данные будут добавлены через JavaScript -->
                        </tbody>
                    </table>
                </div>
                
                <div class="table-controls">
                    <button class="btn btn-edit" onclick="editApplication()">
                        <i>✏️</i> Редактировать
                    </button>
                    <button class="btn btn-status" onclick="showStatusModal()">
                        <i>📊</i> Статус
                    </button>
                    <button class="btn btn-delete" onclick="deleteApplication()">
                        <i>🗑️</i> Удалить
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Panel -->
        <div class="bottom-panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по имени, должности или email...">
                <button class="btn btn-search" onclick="searchApplications()">
                    <i>🔍</i> Найти
                </button>
                <button class="btn btn-show-all" onclick="showAllApplications()">
                    <i>📋</i> Все
                </button>
                <button class="btn btn-stats" onclick="showStatistics()">
                    <i>📊</i> Статистика
                </button>
            </div>
            <div class="status-info" id="statusLabel">
                <i>📊</i> Всего заявок: 0
            </div>
        </div>
    </div>

    <!-- Status Change Modal -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <h3>Изменение статуса заявки</h3>
            <select id="newStatus">
                <option value="Новая">Новая</option>
                <option value="Рассматривается">Рассматривается</option>
                <option value="Интервью">Интервью</option>
                <option value="Принята">Принята</option>
                <option value="Отклонена">Отклонена</option>
            </select>
            <div class="modal-buttons">
                <button class="btn btn-save" onclick="changeStatus()">Сохранить</button>
                <button class="btn btn-cancel" onclick="hideStatusModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // Массив для хранения заявок
        let applications = [];
        let selectedRow = null;
        let editingIndex = -1;
        
        // Класс для заявки
        class JobApplication {
            constructor(name, email, phone, jobTitle, qualification, status, appliedDate) {
                this.name = name;
                this.email = email;
                this.phone = phone;
                this.jobTitle = jobTitle;
                this.qualification = qualification;
                this.status = status;
                this.appliedDate = appliedDate;
            }
        }
        
        // Валидация email
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        
        // Валидация телефона
        function isValidPhone(phone) {
            return /^\+?[0-9]{10,13}$/.test(phone.replace(/[\s\-\(\)]/g, ''));
        }
        
        // Добавление тестовых данных
        function addSampleData() {
            applications.push(new JobApplication("Иван Петров", "ivan@mail.com", "+79123456789", "Java Developer", "B.Tech", "Новая", "2024-01-15"));
            applications.push(new JobApplication("Анна Смирнова", "anna@mail.com", "+79234567890", "UI/UX Designer", "BFA", "Интервью", "2024-01-16"));
            applications.push(new JobApplication("Петр Сидоров", "petr@mail.com", "+79345678901", "Project Manager", "MBA", "Рассматривается", "2024-01-17"));
            applications.push(new JobApplication("Мария Иванова", "maria@mail.com", "+79456789012", "Data Scientist", "PhD", "Принята", "2024-01-18"));
            applications.push(new JobApplication("Алексей Козлов", "alex@mail.com", "+79567890123", "DevOps Engineer", "MS", "Новая", "2024-01-19"));
        }
        
        // Отображение всех заявок
        function showAllApplications() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            applications.forEach((app, index) => {
                const row = tbody.insertRow();
                row.setAttribute('data-index', index);
                row.onclick = function() { selectRow(this); };
                
                // Определяем класс для статуса
                let statusClass = '';
                switch(app.status) {
                    case 'Новая': statusClass = 'status-new'; break;
                    case 'Рассматривается': statusClass = 'status-review'; break;
                    case 'Интервью': statusClass = 'status-interview'; break;
                    case 'Принята': statusClass = 'status-accepted'; break;
                    case 'Отклонена': statusClass = 'status-rejected'; break;
                }
                
                row.innerHTML = `
                    <td>${app.name}</td>
                    <td>${app.email}</td>
                    <td>${app.phone}</td>
                    <td>${app.jobTitle}</td>
                    <td>${app.qualification}</td>
                    <td><span class="status-badge ${statusClass}">${app.status}</span></td>
                    <td>${app.appliedDate}</td>
                `;
            });
            
            updateStatus();
        }
        
        // Выбор строки
        function selectRow(row) {
            if (selectedRow) {
                selectedRow.style.backgroundColor = '';
            }
            selectedRow = row;
            selectedRow.style.backgroundColor = '#e3f2fd';
        }
        
        // Подача заявки
        function applyJob() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const jobTitle = document.getElementById('jobTitle').value.trim();
            const qualification = document.getElementById('qualification').value.trim();
            const status = document.getElementById('status').value;
            
            // Валидация
            if (!name || !email || !phone || !jobTitle || !qualification) {
                alert('❌ Пожалуйста, заполните все поля!');
                return;
            }
            
            if (!isValidEmail(email)) {
                alert('❌ Введите корректный email!');
                return;
            }
            
            if (!isValidPhone(phone)) {
                alert('❌ Введите корректный телефон!');
                return;
            }
            
            const appliedDate = new Date().toISOString().split('T')[0];
            
            if (editingIndex !== -1) {
                // Обновляем существующую заявку
                applications[editingIndex] = new JobApplication(name, email, phone, jobTitle, qualification, status, appliedDate);
                editingIndex = -1;
                alert('✅ Заявка успешно обновлена!');
            } else {
                // Добавляем новую заявку
                applications.push(new JobApplication(name, email, phone, jobTitle, qualification, status, appliedDate));
                alert('✅ Заявка успешно отправлена!');
            }
            
            showAllApplications();
            clearForm();
        }
        
        // Очистка формы
        function clearForm() {
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('jobTitle').value = '';
            document.getElementById('qualification').value = '';
            document.getElementById('status').selectedIndex = 0;
            editingIndex = -1;
        }
        
        // Редактирование заявки
        function editApplication() {
            if (!selectedRow) {
                alert('❌ Выберите заявку для редактирования!');
                return;
            }
            
            const index = selectedRow.getAttribute('data-index');
            const app = applications[index];
            
            document.getElementById('name').value = app.name;
            document.getElementById('email').value = app.email;
            document.getElementById('phone').value = app.phone;
            document.getElementById('jobTitle').value = app.jobTitle;
            document.getElementById('qualification').value = app.qualification;
            document.getElementById('status').value = app.status;
            
            editingIndex = index;
        }
        
        // Удаление заявки
        function deleteApplication() {
            if (!selectedRow) {
                alert('❌ Выберите заявку для удаления!');
                return;
            }
            
            if (confirm('Вы уверены, что хотите удалить эту заявку?')) {
                const index = selectedRow.getAttribute('data-index');
                applications.splice(index, 1);
                showAllApplications();
                selectedRow = null;
                alert('✅ Заявка успешно удалена!');
            }
        }
        
        // Показать модальное окно статуса
        function showStatusModal() {
            if (!selectedRow) {
                alert('❌ Выберите заявку!');
                return;
            }
            document.getElementById('statusModal').style.display = 'flex';
        }
        
        // Скрыть модальное окно
        function hideStatusModal() {
            document.getElementById('statusModal').style.display = 'none';
        }
        
        // Изменение статуса
        function changeStatus() {
            const index = selectedRow.getAttribute('data-index');
            const newStatus = document.getElementById('newStatus').value;
            
            applications[index].status = newStatus;
            showAllApplications();
            hideStatusModal();
            alert('✅ Статус обновлен!');
        }
        
        // Поиск заявок
        function searchApplications() {
            const searchText = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!searchText) {
                showAllApplications();
                return;
            }
            
            const filtered = applications.filter(app => 
                app.name.toLowerCase().includes(searchText) ||
                app.jobTitle.toLowerCase().includes(searchText) ||
                app.email.toLowerCase().includes(searchText)
            );
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            filtered.forEach((app, index) => {
                const row = tbody.insertRow();
                const originalIndex = applications.indexOf(app);
                row.setAttribute('data-index', originalIndex);
                row.onclick = function() { selectRow(this); };
                
                let statusClass = '';
                switch(app.status) {
                    case 'Новая': statusClass = 'status-new'; break;
                    case 'Рассматривается': statusClass = 'status-review'; break;
                    case 'Интервью': statusClass = 'status-interview'; break;
                    case 'Принята': statusClass = 'status-accepted'; break;
                    case 'Отклонена': statusClass = 'status-rejected'; break;
                }
                
                row.innerHTML = `
                    <td>${app.name}</td>
                    <td>${app.email}</td>
                    <td>${app.phone}</td>
                    <td>${app.jobTitle}</td>
                    <td>${app.qualification}</td>
                    <td><span class="status-badge ${statusClass}">${app.status}</span></td>
                    <td>${app.appliedDate}</td>
                `;
            });
        }
        
        // Обновление статуса
        function updateStatus() {
            const count = applications.length;
            const newCount = applications.filter(a => a.status === 'Новая').length;
            const acceptedCount = applications.filter(a => a.status === 'Принята').length;
            
            document.getElementById('statusLabel').innerHTML = 
                `<i>📊</i> Всего заявок: ${count} | Новых: ${newCount} | Принято: ${acceptedCount}`;
        }
        
        // Показать статистику
        function showStatistics() {
            const total = applications.length;
            const newCount = applications.filter(a => a.status === 'Новая').length;
            const reviewCount = applications.filter(a => a.status === 'Рассматривается').length;
            const interviewCount = applications.filter(a => a.status === 'Интервью').length;
            const acceptedCount = applications.filter(a => a.status === 'Принята').length;
            const rejectedCount = applications.filter(a => a.status === 'Отклонена').length;
            
            const stats = `
                📊 СТАТИСТИКА ЗАЯВОК
                
                Всего заявок: ${total}
                
                По статусам:
                • Новая: ${newCount}
                • Рассматривается: ${reviewCount}
                • Интервью: ${interviewCount}
                • Принята: ${acceptedCount}
                • Отклонена: ${rejectedCount}
            `;
            
            alert(stats);
        }
        
        // Инициализация
        window.onload = function() {
            addSampleData();
            showAllApplications();
        };
    </script>
</body>
</html>
